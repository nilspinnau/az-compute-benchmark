#cloud-config

package_update: true
package_upgrade: false

packages:
  - sysbench
  - fio
  - iperf3
  - gcc
  - make
  - bc
  - git
  - curl
  - numactl
  - ethtool
  - jq
  - perl
  - dmidecode

write_files:
  - path: /etc/benchmark-config
    content: |
      STORAGE_ACCOUNT=${storage_account}
      CONTAINER_NAME=${container_name}
      GITHUB_REPO_URL=${github_repo_url}
      GITHUB_REF=${github_ref}
      BENCHMARK_SUITES=${benchmark_suites}
    permissions: '0644'

runcmd:
  - mkdir -p /home/${admin_username}/benchmark
  - chown ${admin_username}:users /home/${admin_username}/benchmark
  - echo "cloud-init benchmark setup complete" > /home/${admin_username}/benchmark/.cloud-init-done
